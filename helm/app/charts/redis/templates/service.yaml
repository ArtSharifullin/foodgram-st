apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.ports.name }}-service
  namespace: foodgram
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: redis.foodgram.local
spec:
  type: LoadBalancer
  ports:
    - port: {{ .Values.service.ports.port }}
      targetPort: {{ .Values.service.ports.targetPort }}
  selector:
    app: {{ .Values.service.ports.name }}