apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}-statefullset
  namespace: foodgram
  labels:
{{ include "redis.labels" . | indent 4 }}
spec:
  serviceName: {{ .Chart.Name }}-service
  {{- with .Values.statefulset }}
  replicas: {{ .replicas }}
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
      - name: {{ .name }}
        image: {{ printf "%s:%s" .image.name .image.tag }}
        imagePullPolicy: {{ .image.pullPolicy | quote}}
  {{- end }}
        ports:
        - containerPort: {{ .Values.service.ports.port }}
        volumeMounts:
        - name: {{ .Chart.Name }}-storage
  {{- with .Values.statefulset }}
          mountPath: {{ .pvc.mountPath }}
  volumeClaimTemplates:
  - metadata:
      name: {{ .name }}-storage
    spec:
      accessModes: 
      - {{ .pvc.accessModes | quote}}
      resources:
        requests:
          storage: {{ .pvc.storage | quote}}
  {{- end }}
  